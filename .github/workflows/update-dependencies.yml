name: 🔄 Update All Dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # استفاده از GITHUB_TOKEN برای خواندن (کافی است)

      - name: Find and update all actions
        id: actions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find .github/workflows -name "*.yml" -o -name "*.yaml" | \
            xargs grep -ohE 'uses: [a-zA-Z0-9_/-]+@[v0-9a-zA-Z.]+' 2>/dev/null | \
            sed 's/uses: //' | sort -u > /tmp/actions.txt
          
          while IFS= read -r action_ref; do
            [ -z "$action_ref" ] && continue
            action_name=$(echo "$action_ref" | cut -d'@' -f1)
            current_version=$(echo "$action_ref" | cut -d'@' -f2)
            if [[ "$action_name" == actions/* ]]; then
              latest=$(curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$action_name/releases/latest" | \
                grep -o '"tag_name": "[^"]*' | cut -d'"' -f4)
              if [ -n "$latest" ] && [ "$latest" != "$current_version" ]; then
                echo "Updating $action_name: $current_version -> $latest"
                find .github/workflows -name "*.yml" -o -name "*.yaml" | \
                  xargs sed -i "s|\($action_name@\)[^[:space:]]*|\1$latest|g"
              fi
            fi
          done < /tmp/actions.txt
          
          if git diff --quiet .github/workflows; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version: '>=1.21.3'

      - name: Update Go modules
        id: go
        if: hashFiles('go.mod') != ''
        run: |
          cp go.mod go.mod.bak
          cp go.sum go.sum.bak
          go get -u ./...
          go mod tidy
          
          if git diff --quiet go.mod go.mod.bak && git diff --quiet go.sum go.sum.bak; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            mkdir -p reports
            NOW=$(date '+%Y-%m-%d %H:%M:%S')
            MOD_LINES=$(git diff go.mod.bak go.mod 2>/dev/null | wc -l)
            SUM_LINES=$(git diff go.sum.bak go.sum 2>/dev/null | wc -l)
            cat > reports/go_deps_update.md << EOF
          # 📦 گزارش به‌روزرسانی Go Dependencies
          **تاریخ:** ${NOW}
          - تغییرات go.mod: ${MOD_LINES} خط
          - تغییرات go.sum: ${SUM_LINES} خط
          EOF
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: '20'

      - name: Update npm packages
        id: npm
        if: hashFiles('package.json') != ''
        run: |
          npm install -g npm@latest
          npm install -g npm-check-updates
          ncu -u
          npm install
          if git diff --quiet package.json package-lock.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push all changes
        if: >-
          (steps.actions.outputs.changed == 'true') ||
          (steps.go.outputs.changed == 'true') ||
          (steps.npm.outputs.changed == 'true')
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .github/workflows go.mod go.sum 2>/dev/null || true
          [ -f package.json ] && git add package.json
          [ -f package-lock.json ] && git add package-lock.json
          [ -d reports ] && git add reports
          git diff --staged --quiet || git commit -m "chore(deps): update all dependencies [skip ci]"
          git push "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main

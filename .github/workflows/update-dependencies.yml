name: 🔄 Update Dependencies

on:
  schedule:
    - cron: "0 0 * * 0"   # هر یکشنبه ساعت 00:00 UTC
  workflow_dispatch:       # قابلیت اجرای دستی

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.3'

      - name: Create reports directory
        run: mkdir -p reports

      - name: Backup current go.mod and go.sum
        run: |
          cp go.mod go.mod.bak
          cp go.sum go.sum.bak

      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy

      - name: Check for changes
        id: changes
        run: |
          if ! diff -q go.mod go.mod.bak > /dev/null 2>&1 || ! diff -q go.sum go.sum.bak > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate statistics
        id: stats
        if: steps.changes.outputs.changed == 'true'
        run: |
          MOD_ADDED=$(git diff --numstat go.mod.bak go.mod | awk '{print $1}' | grep -E '^[0-9]+$' || echo 0)
          MOD_REMOVED=$(git diff --numstat go.mod.bak go.mod | awk '{print $2}' | grep -E '^[0-9]+$' || echo 0)
          MOD_CHANGES=$((MOD_ADDED + MOD_REMOVED))
          SUM_ADDED=$(git diff --numstat go.sum.bak go.sum | awk '{print $1}' | grep -E '^[0-9]+$' || echo 0)
          SUM_REMOVED=$(git diff --numstat go.sum.bak go.sum | awk '{print $2}' | grep -E '^[0-9]+$' || echo 0)
          SUM_CHANGES=$((SUM_ADDED + SUM_REMOVED))
          echo "mod_changes=$MOD_CHANGES" >> $GITHUB_OUTPUT
          echo "sum_changes=$SUM_CHANGES" >> $GITHUB_OUTPUT
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Build Markdown report
        if: steps.changes.outputs.changed == 'true'
        run: |
          NOW=$(date '+%Y-%m-%d %H:%M:%S')
          cat > reports/deps_update_report.md << EOF
          # 📦 گزارش به‌روزرسانی وابستگی‌ها
          **تاریخ اجرا:** ${NOW}
          ## خلاصه آماری
          | معیار | مقدار |
          |-------|-------|
          | خطوط تغییر یافته در go.mod | ${{ steps.stats.outputs.mod_changes }} |
          | تغییرات در go.sum | ${{ steps.stats.outputs.sum_changes }} |
          ---
          ✅ گزارش توسط GitHub Actions تولید شده است.
          EOF

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add go.mod go.sum reports/deps_update_report.md
          git diff --staged --quiet || git commit -m "chore(deps): update dependencies [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

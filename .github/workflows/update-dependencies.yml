name: 🔄 Update All Dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Find and update all actions
        id: actions
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          UPDATED_ACTIONS=""
          find .github/workflows -name "*.yml" -o -name "*.yaml" | \
            xargs grep -ohE 'uses: [a-zA-Z0-9_/-]+@[v0-9a-zA-Z.]+' 2>/dev/null | \
            sed 's/uses: //' | sort -u > /tmp/actions.txt
          
          while IFS= read -r action_ref; do
            [ -z "$action_ref" ] && continue
            action_name=$(echo "$action_ref" | cut -d'@' -f1)
            current_version=$(echo "$action_ref" | cut -d'@' -f2)
            if [[ "$action_name" == actions/* ]]; then
              latest=$(curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$action_name/releases/latest" | \
                grep -o '"tag_name": "[^"]*' | cut -d'"' -f4)
              if [ -n "$latest" ] && [ "$latest" != "$current_version" ]; then
                echo "Updating $action_name: $current_version -> $latest"
                find .github/workflows -name "*.yml" -o -name "*.yaml" | \
                  xargs sed -i "s|\($action_name@\)[^[:space:]]*|\1$latest|g"
                UPDATED_ACTIONS="${UPDATED_ACTIONS}\n- $action_name: $current_version → $latest"
              fi
            fi
          done < /tmp/actions.txt
          
          echo "UPDATED_ACTIONS<<EOF" >> $GITHUB_ENV
          echo -e "$UPDATED_ACTIONS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          if git diff --quiet .github/workflows; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        if: hashFiles('go.mod') != ''
        with:
          go-version: '>=1.21.3'

      - name: Update Go modules
        id: go
        if: hashFiles('go.mod') != ''
        run: |
          cp go.mod go.mod.bak
          cp go.sum go.sum.bak
          go get -u ./...
          go mod tidy
          
          if git diff --quiet go.mod go.mod.bak && git diff --quiet go.sum go.sum.bak; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            MOD_LINES=$(git diff go.mod.bak go.mod 2>/dev/null | wc -l)
            SUM_LINES=$(git diff go.sum.bak go.sum 2>/dev/null | wc -l)
            echo "MOD_LINES=$MOD_LINES" >> $GITHUB_ENV
            echo "SUM_LINES=$SUM_LINES" >> $GITHUB_ENV
          fi

      - name: Generate report
        run: |
          mkdir -p reports
          NOW=$(date '+%Y-%m-%d %H:%M:%S')
          
          # عنوان گزارش
          echo "# 📦 گزارش به‌روزرسانی وابستگی‌ها" > reports/deps_update_report.md
          echo "" >> reports/deps_update_report.md
          echo "**تاریخ اجرا:** $NOW" >> reports/deps_update_report.md
          echo "" >> reports/deps_update_report.md
          
          # بخش GitHub Actions
          echo "## 🛠️ GitHub Actions" >> reports/deps_update_report.md
          if [ -n "${{ env.UPDATED_ACTIONS }}" ]; then
            echo "${{ env.UPDATED_ACTIONS }}" >> reports/deps_update_report.md
          else
            echo "تغییری یافت نشد." >> reports/deps_update_report.md
          fi
          echo "" >> reports/deps_update_report.md
          
          # بخش Go modules
          echo "## 🐹 Go modules" >> reports/deps_update_report.md
          if [ "${{ steps.go.outputs.changed }}" == "true" ]; then
            echo "- تغییرات در go.mod: **${{ env.MOD_LINES }}** خط" >> reports/deps_update_report.md
            echo "- تغییرات در go.sum: **${{ env.SUM_LINES }}** خط" >> reports/deps_update_report.md
          else
            echo "تغییری یافت نشد." >> reports/deps_update_report.md
          fi
          echo "" >> reports/deps_update_report.md
          echo "---" >> reports/deps_update_report.md
          echo "✅ این گزارش به صورت خودکار تولید شده است." >> reports/deps_update_report.md

      - name: Commit and push all changes
        if: steps.actions.outputs.changed == 'true' || steps.go.outputs.changed == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add go.mod go.sum .github/workflows reports/
          git diff --staged --quiet || git commit -m "chore(deps): update dependencies and generate report $(date '+%Y-%m-%d')"
          git push origin main
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

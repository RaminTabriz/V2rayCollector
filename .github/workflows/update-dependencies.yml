name: 🔄 Update All Dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and update all actions
        id: actions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find .github/workflows -name "*.yml" -o -name "*.yaml" | \
            xargs grep -ohE 'uses: [a-zA-Z0-9_/-]+@[v0-9a-zA-Z.]+' 2>/dev/null | \
            sed 's/uses: //' | sort -u > /tmp/actions.txt
          
          while IFS= read -r action_ref; do
            [ -z "$action_ref" ] && continue
            action_name=$(echo "$action_ref" | cut -d'@' -f1)
            current_version=$(echo "$action_ref" | cut -d'@' -f2)
            if [[ "$action_name" == actions/* ]]; then
              latest=$(curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$action_name/releases/latest" | \
                grep -o '"tag_name": "[^"]*' | cut -d'"' -f4)
              if [ -n "$latest" ] && [ "$latest" != "$current_version" ]; then
                echo "Updating $action_name: $current_version -> $latest"
                find .github/workflows -name "*.yml" -o -name "*.yaml" | \
                  xargs sed -i "s|\($action_name@\)[^[:space:]]*|\1$latest|g"
              fi
            fi
          done < /tmp/actions.txt
          
          if git diff --quiet .github/workflows; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version: '>=1.21.3'

      - name: Update Go modules
        id: go
        if: hashFiles('go.mod') != ''
        run: |
          cp go.mod go.mod.bak
          cp go.sum go.sum.bak
          go get -u ./...
          go mod tidy
          
          if git diff --quiet go.mod go.mod.bak && git diff --quiet go.sum go.sum.bak; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push all changes
        if: >-
          (steps.actions.outputs.changed == 'true') ||
          (steps.go.outputs.changed == 'true')
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .github/workflows go.mod go.sum 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update dependencies $(date '+%Y-%m-%d')"
          git push origin HEAD:refs/heads/dependabot-update
          gh pr create --title "Update dependencies $(date '+%Y-%m-%d')" --body "Automated dependency update"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

name: Simple Updater

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Merge valid links
        run: |
          if [ -s valid_subscription_links.txt ]; then
            jq -r '.[]' Sources.json | sort -u > current.txt
            cat valid_subscription_links.txt | sort -u > new.txt
            cat current.txt new.txt | sort -u > merged.txt
            jq -R . merged.txt | jq -s . > Sources.json
            echo "Updated Sources.json"
          fi
      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Sources.json
          git diff --staged --quiet || git commit -m "Update Sources.json"
          git push

name: Simple Sources Updater

on:
  workflow_run:
    workflows: ["Find & Validate Subscription Links on GitHub"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Merge valid links
        run: |
          # اگر فایل معتبر وجود نداشت، خارج شو
          if [ ! -s valid_subscription_links.txt ]; then
            echo "No valid links file, exiting"
            exit 0
          fi
          
          # ساخت لیست یکتا از لینک‌های فعلی + جدید
          jq -r '.[]' Sources.json | sort -u > current.txt
          cat valid_subscription_links.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sort -u > new.txt
          cat current.txt new.txt | sort -u > merged.txt
          
          # ساخت JSON جدید
          jq -R . merged.txt | jq -s . > Sources.json.tmp
          mv Sources.json.tmp Sources.json
          
          # گزارش تعداد
          ADDED=$(comm -13 current.txt new.txt | wc -l)
          echo "Added $ADDED new links"
          echo "ADDED=$ADDED" >> $GITHUB_ENV
      
      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Sources.json
          git diff --staged --quiet || git commit -m "Update Sources.json"
          git push

name: Smart Subscription Sources Updater

on:
  workflow_run:
    workflows: ["Find & Validate Subscription Links on GitHub"]
    types: [completed]
  workflow_dispatch:
    inputs:
      enable_scan:
        description: 'اسکن مخازن موجود'
        type: boolean
        default: true
      enable_discovery:
        description: 'جستجوی مخازن جدید'
        type: boolean
        default: false
      force_rescan:
        description: 'اجبار به اسکن مجدد'
        type: boolean
        default: false
      search_keywords:
        description: 'کلمات کلیدی'
        type: string
        default: 'v2ray subscription config.txt'
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: update-sources
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: ایجاد پوشه‌ها و فایل‌های اولیه
        run: |
          mkdir -p reports backups stats
          [ ! -f Sources.json ] && echo "[]" > Sources.json
          [ ! -f channels.csv ] && echo "# Telegram Channels" > channels.csv
          [ ! -f stats/history.csv ] && echo "date,ADDED,SCAN_ADDED,DISCOVERED_ADDED" > stats/history.csv
          if [ ! -f filters.json ]; then
            cat > filters.json << 'EOF'
{
  "exclude_repos": [],
  "include_paths": ["", "main", "subscriptions", "sub", "Sub", "subs", "sing-box", "clash", "v2ray", "configs"],
  "exclude_patterns": ["test", "sample", "example", "demo"],
  "search_keywords": ["v2ray", "subscription", "config.txt", "vmess", "vless"]
}
EOF
          fi

      - name: بکاپ از Sources.json
        run: |
          if [ -s Sources.json ]; then
            cp Sources.json "backups/Sources_$(date +%Y%m%d_%H%M%S).json"
            find backups -name "Sources_*.json" -type f -mtime +7 -delete
          fi

      - name: بررسی وجود فایل معتبر
        id: check_valid
        run: |
          if [ -s valid_subscription_links.txt ]; then
            echo "has_valid=true" >> $GITHUB_OUTPUT
          else
            echo "has_valid=false" >> $GITHUB_OUTPUT
          fi

      - name: ادغام لینک‌های معتبر
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          set -e
          if ! jq -e '.' Sources.json >/dev/null 2>&1; then
            echo "[]" > Sources.json
          fi
          jq -r '.[]' Sources.json | sort -u > current_sources.txt
          tr -d '\r' < valid_subscription_links.txt | awk '{$1=$1;print}' | sort -u > valid_sorted.txt
          cat current_sources.txt valid_sorted.txt | sort -u > merged_sources.txt
          ADDED=$(comm -13 current_sources.txt valid_sorted.txt | wc -l)
          echo "ADDED_COUNT=$ADDED" >> $GITHUB_ENV
          if [ -s merged_sources.txt ]; then
            jq -R . merged_sources.txt | jq -s . > Sources.json.tmp
            mv Sources.json.tmp Sources.json
          else
            echo "[]" > Sources.json
          fi
          echo "✅ $ADDED لینک جدید از ادغام اضافه شد."

      - name: کش مخازن اسکن شده
        uses: actions/cache@v4
        id: cache-scanned
        with:
          path: scanned_repos.txt
          key: scanned-repos-${{ github.run_id }}
          restore-keys: |
            scanned-repos-${{ github.run_id }}

      - name: آماده‌سازی کش
        run: |
          [ ! -f scanned_repos.txt ] && touch scanned_repos.txt
          FORCE_RESCAN="${{ github.event.inputs.force_rescan || 'false' }}"
          if [ "$FORCE_RESCAN" = "true" ]; then
            > scanned_repos.txt
          fi

      - name: اسکن مخازن موجود
        if: github.event.inputs.enable_scan != 'false' || github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          # تابع retry با backoff
          retry_with_backoff() {
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              if eval "$1"; then
                return 0
              fi
              echo "⏳ تلاش $attempt/$max_attempts ناموفق، منتظر $((attempt*10)) ثانیه..."
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
            return 1
          }
          echo "🔍 اسکن مخازن موجود..."
          NEW_LINKS_FROM_SCAN="new_from_scan.txt"
          > "$NEW_LINKS_FROM_SCAN"
          
          # حذف لینک‌های مرده
          echo "🧹 حذف لینک‌های نامعتبر..."
          jq -r '.[]' Sources.json > all_links.txt
          > valid_links.txt
          while IFS= read -r url; do
            if retry_with_backoff "curl -sI -L --max-time 10 '$url' | head -1 | grep -q '200\|301\|302'"; then
              echo "$url" >> valid_links.txt
            else
              echo "🗑️ لینک مرده: $url"
            fi
          done < all_links.txt
          jq -R . valid_links.txt | jq -s . > Sources.json
          
          jq -r '.[]' Sources.json > all_current_links.txt
          [ ! -f all_current_links.txt ] && touch all_current_links.txt
          
          EXCLUDE_REPOS=$(jq -r '.exclude_repos[]' filters.json 2>/dev/null | tr '\n' '|')
          INCLUDE_PATHS=$(jq -r '.include_paths[]' filters.json 2>/dev/null)
          EXCLUDE_PATTERNS=$(jq -r '.exclude_patterns[]' filters.json 2>/dev/null | tr '\n' '|')
          
          TOTAL_API_CALLS=0
          repos_count=0
          
          if [ -s all_current_links.txt ]; then
            while IFS= read -r url; do
              url="${url#"${url%%[![:space:]]*}"}"
              url="${url%"${url##*[![:space:]]}"}"
              [ -z "$url" ] && continue
              REPO_INFO=$(echo "$url" | awk -F'/' '{for(i=1;i<=NF;i++) if($i=="raw.githubusercontent.com") {print $(i-3), $(i-2); exit}}')
              [ -z "$REPO_INFO" ] && continue
              OWNER=$(echo "$REPO_INFO" | cut -d' ' -f1)
              REPO=$(echo "$REPO_INFO" | cut -d' ' -f2)
              REPO_FULL="$OWNER/$REPO"
              
              if [ -n "$EXCLUDE_REPOS" ] && echo "$REPO_FULL" | grep -qE "$EXCLUDE_REPOS"; then continue; fi
              if grep -Fxq "$REPO_FULL" scanned_repos.txt; then continue; fi
              
              echo "📁 اسکن: $REPO_FULL"
              repos_count=$((repos_count + 1))
              
              for dir_path in $INCLUDE_PATHS; do
                API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$dir_path"
                TOTAL_API_CALLS=$((TOTAL_API_CALLS + 1))
                response=$(retry_with_backoff "curl -s -H 'Authorization: token $GH_TOKEN' -H 'Accept: application/vnd.github.v3+json' '$API_URL'") || continue
                if echo "$response" | jq -e '.message == "Not Found"' >/dev/null 2>&1; then continue; fi
                
                echo "$response" | jq -r '.[] | select(.type=="file") | select(.name | endswith(".txt")) | .download_url' 2>/dev/null > /tmp/files.txt
                while IFS= read -r file_url; do
                  if [ -n "$EXCLUDE_PATTERNS" ] && echo "$file_url" | grep -qiE "$EXCLUDE_PATTERNS"; then continue; fi
                  if retry_with_backoff "curl -sL --max-time 10 '$file_url' | head -c 2000 | grep -qE '(vmess|vless|trojan|ss://|ssr://)'"; then
                    if ! grep -Fxq "$file_url" all_current_links.txt; then
                      echo "$file_url" >> "$NEW_LINKS_FROM_SCAN"
                      echo "  ✅ ساب جدید: $file_url"
                    fi
                  fi
                done < /tmp/files.txt
              done
              echo "$REPO_FULL" >> scanned_repos.txt
              sleep 0.2
            done < all_current_links.txt
          fi
          
          sort -u -o "$NEW_LINKS_FROM_SCAN" "$NEW_LINKS_FROM_SCAN" 2>/dev/null
          NEW_COUNT=$(wc -l < "$NEW_LINKS_FROM_SCAN" 2>/dev/null || echo "0")
          echo "NEW_LINKS_FROM_SCAN_COUNT=$NEW_COUNT" >> $GITHUB_ENV
          echo "TOTAL_REPOS_SCANNED=$repos_count" >> $GITHUB_ENV
          echo "TOTAL_API_CALLS=$TOTAL_API_CALLS" >> $GITHUB_ENV
          
          if [ "$NEW_COUNT" -gt 0 ]; then
            cat "$NEW_LINKS_FROM_SCAN" >> all_current_links.txt
            sort -u all_current_links.txt -o all_current_links.txt
          fi
          echo "✅ اسکن مخازن موجود پایان یافت. $NEW_COUNT ساب جدید پیدا شد."
          set -e

      - name: جستجوی مخازن جدید
        if: github.event.inputs.enable_discovery == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          retry_with_backoff() {
            local max_attempts=3
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              if eval "$1"; then
                return 0
              fi
              echo "⏳ تلاش $attempt/$max_attempts ناموفق، منتظر $((attempt*10)) ثانیه..."
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
            return 1
          }
          echo "🔎 جستجوی مخازن جدید..."
          SEARCH_KEYWORDS="${{ github.event.inputs.search_keywords || 'v2ray subscription config.txt' }}"
          QUERY=$(echo "$SEARCH_KEYWORDS" | tr ' ' '+')
          
          DISCOVERED_REPOS="discovered_repos.txt"
          NEW_SUBS_DISCOVERED="new_subs_from_discovery.txt"
          > "$DISCOVERED_REPOS"
          > "$NEW_SUBS_DISCOVERED"
          
          for page in 1 2 3; do
            SEARCH_URL="https://api.github.com/search/repositories?q=$QUERY+extension:txt&sort=updated&order=desc&per_page=30&page=$page"
            RESP=$(retry_with_backoff "curl -s -H 'Authorization: token $GH_TOKEN' -H 'Accept: application/vnd.github.v3+json' '$SEARCH_URL'") || break
            echo "$RESP" | jq -r '.items[].full_name' 2>/dev/null >> "$DISCOVERED_REPOS"
            sleep 0.5
          done
          
          sort -u -o "$DISCOVERED_REPOS" "$DISCOVERED_REPOS"
          comm -23 "$DISCOVERED_REPOS" scanned_repos.txt > new_repos_to_scan.txt
          NEW_REPOS_COUNT=$(wc -l < new_repos_to_scan.txt)
          [ $NEW_REPOS_COUNT -eq 0 ] && exit 0
          
          INCLUDE_PATHS=$(jq -r '.include_paths[]' filters.json 2>/dev/null)
          EXCLUDE_PATTERNS=$(jq -r '.exclude_patterns[]' filters.json 2>/dev/null | tr '\n' '|')
          touch all_current_links.txt
          cp all_current_links.txt all_current_links_backup.txt
          
          while IFS= read -r repo_full; do
            [ -z "$repo_full" ] && continue
            OWNER=$(echo "$repo_full" | cut -d'/' -f1)
            REPO=$(echo "$repo_full" | cut -d'/' -f2)
            echo "📁 اسکن مخزن جدید: $repo_full"
            
            for dir_path in $INCLUDE_PATHS; do
              API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$dir_path"
              response=$(retry_with_backoff "curl -s -H 'Authorization: token $GH_TOKEN' -H 'Accept: application/vnd.github.v3+json' '$API_URL'") || continue
              echo "$response" | jq -r '.[] | select(.type=="file") | select(.name | endswith(".txt")) | .download_url' 2>/dev/null > /tmp/discovered_files.txt
              while IFS= read -r file_url; do
                if [ -n "$EXCLUDE_PATTERNS" ] && echo "$file_url" | grep -qiE "$EXCLUDE_PATTERNS"; then continue; fi
                if retry_with_backoff "curl -sL --max-time 10 '$file_url' | head -c 2000 | grep -qE '(vmess|vless|trojan|ss://|ssr://)'"; then
                  if ! grep -Fxq "$file_url" all_current_links_backup.txt; then
                    echo "$file_url" >> "$NEW_SUBS_DISCOVERED"
                    echo "  ✅ ساب جدید از کشف: $file_url"
                  fi
                fi
              done < /tmp/discovered_files.txt
            done
            echo "$repo_full" >> scanned_repos.txt
            sleep 0.2
          done < new_repos_to_scan.txt
          
          if [ -s "$NEW_SUBS_DISCOVERED" ]; then
            sort -u all_current_links.txt "$NEW_SUBS_DISCOVERED" -o all_current_links.txt
            DISCOVERED_COUNT=$(wc -l < "$NEW_SUBS_DISCOVERED")
            echo "DISCOVERED_LINKS_COUNT=$DISCOVERED_COUNT" >> $GITHUB_ENV
          fi

      - name: بازسازی نهایی Sources.json
        run: |
          if [ -s all_current_links.txt ]; then
            jq -R . all_current_links.txt | jq -s . > Sources.json.new
            mv Sources.json.new Sources.json
          fi

      - name: استخراج کانال‌های تلگرام
        run: |
          echo "📡 استخراج کانال‌های تلگرام..."
          cat all_current_links.txt new_from_scan.txt new_subs_from_discovery.txt 2>/dev/null | sort -u > all_subs.txt
          > telegram_channels_temp.txt
          normalize_telegram() {
            local input="$1"
            input="${input#@}"
            input=$(echo "$input" | sed -E 's#https?://(t\.me/|telegram\.me/|t\.me/s/)(.*)#\2#i')
            input=$(echo "$input" | sed -E 's|[^a-zA-Z0-9_].*||')
            [ -z "$input" ] && return
            echo "https://t.me/$input"
          } || true
          while IFS= read -r sub_url; do
            if echo "$sub_url" | grep -qE '(t\.me/|telegram\.me/|@[a-zA-Z0-9_]+)'; then
              channel=$(echo "$sub_url" | grep -oE '(t\.me/[a-zA-Z0-9_]+|telegram\.me/[a-zA-Z0-9_]+|@[a-zA-Z0-9_]+)' | head -1)
              norm=$(normalize_telegram "$channel")
              [ -n "$norm" ] && echo "$norm" >> telegram_channels_temp.txt
            fi
            curl -sL --max-time 10 "$sub_url" | head -c 5000 | grep -oE '(https?://(t\.me/|telegram\.me/)[a-zA-Z0-9_]+|@[a-zA-Z0-9_]+)' | while read -r match; do
              norm=$(normalize_telegram "$match")
              [ -n "$norm" ] && echo "$norm" >> telegram_channels_temp.txt
            done
          done < all_subs.txt
          sort -u telegram_channels_temp.txt -o telegram_channels_temp.txt
          [ ! -f channels.csv ] && echo "# Telegram Channels" > channels.csv
          grep -Eo 'https://t\.me/[a-zA-Z0-9_]+' channels.csv | sort -u > existing_channels.txt 2>/dev/null || touch existing_channels.txt
          comm -13 existing_channels.txt telegram_channels_temp.txt > new_channels.txt
          NEW_CHANNELS=$(wc -l < new_channels.txt)
          echo "NEW_CHANNELS_COUNT=$NEW_CHANNELS" >> $GITHUB_ENV
          if [ $NEW_CHANNELS -gt 0 ]; then
            cat new_channels.txt >> channels.csv
          fi

      - name: ذخیره آمار تاریخی
        run: |
          ADDED=${ADDED_COUNT:-0}
          SCAN_ADDED=${NEW_LINKS_FROM_SCAN_COUNT:-0}
          DISCOVERED_ADDED=${DISCOVERED_LINKS_COUNT:-0}
          echo "$(date '+%Y-%m-%d'),$ADDED,$SCAN_ADDED,$DISCOVERED_ADDED" >> stats/history.csv

      - name: گزارش نهایی
        run: |
          ADDED=${ADDED_COUNT:-0}
          SCAN_ADDED=${NEW_LINKS_FROM_SCAN_COUNT:-0}
          DISCOVERED_ADDED=${DISCOVERED_LINKS_COUNT:-0}
          CHANNELS=${NEW_CHANNELS_COUNT:-0}
          TOTAL=$((ADDED+SCAN_ADDED+DISCOVERED_ADDED))
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          mkdir -p reports
          cat > reports/update_summary.md << EOF
# 📡 گزارش به‌روزرسانی هوشمند
**تاریخ:** $DATE

| مرحله | تعداد |
|-------|-------|
| لینک‌های جدید از ادغام | $ADDED |
| اسکن مخازن موجود | $SCAN_ADDED |
| جستجوی مخازن جدید | $DISCOVERED_ADDED |
| **جمع ساب‌لینک‌های جدید** | $TOTAL |
| کانال‌های تلگرام جدید | $CHANNELS |
| مخازن اسکن شده | ${TOTAL_REPOS_SCANNED:-0} |
| کل درخواست‌های API | ${TOTAL_API_CALLS:-0} |
EOF
          cat reports/update_summary.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: update-reports
          path: reports/

      - name: Commit و Push تغییرات
        id: commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git add Sources.json scanned_repos.txt channels.csv reports/ backups/ stats/
          if git diff --staged --quiet; then
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "به‌روزرسانی: +${ADDED_COUNT:-0} (ادغام), +${NEW_LINKS_FROM_SCAN_COUNT:-0} (اسکن), +${DISCOVERED_LINKS_COUNT:-0} (کشف), +${NEW_CHANNELS_COUNT:-0} (کانال)"
            git pull --rebase origin main || git pull --no-rebase origin main
            git push origin main
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: ارسال اعلان به تلگرام
        if: always() && steps.commit.outputs.pushed == 'true' && secrets.TG_BOT_TOKEN != ''
        run: |
          TOTAL=$(( ${ADDED_COUNT:-0} + ${NEW_LINKS_FROM_SCAN_COUNT:-0} + ${DISCOVERED_LINKS_COUNT:-0} ))
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=✅ Sources.json به‌روز شد! $TOTAL لینک جدید اضافه شد. (ادغام:+${ADDED_COUNT:-0}, اسکن:+${NEW_LINKS_FROM_SCAN_COUNT:-0}, کشف:+${DISCOVERED_LINKS_COUNT:-0})"

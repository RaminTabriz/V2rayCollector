name: Update Sources.json from Valid Links

on:
  workflow_run:
    workflows: ["Find & Validate Subscription Links on GitHub"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare environment
        run: |
          mkdir -p reports
          if [ ! -f Sources.json ]; then
            echo "[]" > Sources.json
          fi

      - name: Check if valid links file exists
        id: check_valid
        run: |
          if [ -s valid_subscription_links.txt ]; then
            echo "has_valid=true" >> $GITHUB_OUTPUT
          else
            echo "has_valid=false" >> $GITHUB_OUTPUT
            echo "⚠️ No valid_subscription_links.txt found or empty. Skipping update."
          fi

      - name: Merge valid links into Sources.json (using jq)
        id: merge
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          # Install jq (usually pre-installed, but ensure)
          sudo apt-get update && sudo apt-get install -y jq
          
          # Extract existing links (trimming whitespace automatically)
          jq -r '.[]' Sources.json | sort -u > current_sources.txt
          
          # Trim whitespace from valid links and sort
          sed 's/^[[:space:]]*//;s/[[:space:]]*$//' valid_subscription_links.txt | sort -u > valid_sorted.txt
          
          # Merge and get unique
          cat current_sources.txt valid_sorted.txt | sort -u > merged_sources.txt
          
          ORIGINAL_COUNT=$(cat current_sources.txt | wc -l)
          FINAL_COUNT=$(cat merged_sources.txt | wc -l)
          ADDED=$((FINAL_COUNT - ORIGINAL_COUNT))
          echo "ADDED_COUNT=$ADDED" >> $GITHUB_ENV
          
          if [ $ADDED -eq 0 ]; then
            echo "⚠️ No new links to add."
          else
            echo "✅ Adding $ADDED new links"
          fi
          
          # Build new Sources.json with proper indentation (2 spaces)
          echo "[" > Sources.json.new
          while IFS= read -r line; do
            # Escape double quotes and backslashes for JSON
            escaped_line=$(printf "%s" "$line" | sed 's/["\\]/\\&/g')
            echo "  \"$escaped_line\"," >> Sources.json.new
          done < merged_sources.txt
          # Remove trailing comma from last line
          sed -i '$ s/,$//' Sources.json.new
          echo "]" >> Sources.json.new
          
          # Validate JSON before replacing
          if jq empty Sources.json.new 2>/dev/null; then
            mv Sources.json.new Sources.json
            echo "✅ Sources.json updated successfully."
          else
            echo "❌ Invalid JSON generated. Aborting."
            cat Sources.json.new
            exit 1
          fi

      - name: Generate detailed report
        run: |
          RAW=$(cat subscription_links_raw.txt 2>/dev/null | wc -l | tr -d ' ')
          FOUND=$(cat subscription_links_found.txt 2>/dev/null | wc -l | tr -d ' ')
          VALID=$(cat valid_subscription_links.txt 2>/dev/null | wc -l | tr -d ' ')
          ADDED=${ADDED_COUNT:-0}
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          {
            echo "# 📡 گزارش به‌روزرسانی ساب‌لینک‌ها"
            echo ""
            echo "**تاریخ اجرا:** $DATE"
            echo ""
            echo "## 📊 خلاصه آماری"
            echo ""
            echo "| مرحله | تعداد |"
            echo "|-------|-------|"
            echo "| لینک‌های خام اولیه | ${RAW:-0} |"
            echo "| لینک‌های یافت شده | ${FOUND:-0} |"
            echo "| لینک‌های معتبر | ${VALID:-0} |"
            echo "| **لینک‌های جدید اضافه شده** | **$ADDED** |"
            echo ""
            echo "## 🔗 نمونه لینک‌های معتبر (حداکثر ۱۰ مورد)"
            echo ""
            echo '```'
            head -10 valid_subscription_links.txt 2>/dev/null
            echo '```'
            echo ""
            echo "---"
            echo "✅ این گزارش به صورت خودکار تولید شده است."
          } > reports/subscription_update_report.md
          
          cat reports/subscription_update_report.md >> $GITHUB_STEP_SUMMARY

      - name: Commit and push changes
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Sources.json reports/subscription_update_report.md
          if git diff --staged --quiet; then
            echo "📭 No changes to commit."
          else
            git commit -m "📡 Update Sources.json with new valid subscription links ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
            echo "✅ Changes committed and pushed."
          fi

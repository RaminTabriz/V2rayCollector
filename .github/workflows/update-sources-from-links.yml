name: Update Sources.json from Valid Links

on:
  workflow_run:
    workflows: ["Find & Validate Subscription Links on GitHub"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare environment
        run: |
          mkdir -p reports
          if [ ! -f Sources.json ]; then
            echo "[]" > Sources.json
          fi

      - name: Check if valid links file exists
        id: check_valid
        run: |
          if [ -s valid_subscription_links.txt ]; then
            echo "has_valid=true" >> $GITHUB_OUTPUT
          else
            echo "has_valid=false" >> $GITHUB_OUTPUT
            echo "⚠️ No valid_subscription_links.txt found or empty. Skipping update."
          fi

      - name: Merge valid links into Sources.json (pure bash)
        id: merge
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          cat Sources.json | tr -d '[],"' | tr ',' '\n' | sed '/^[[:space:]]*$/d' > current_sources.txt
          cat valid_subscription_links.txt >> current_sources.txt
          sort -u current_sources.txt > merged_sources.txt
          
          ORIGINAL_COUNT=$(cat Sources.json | tr -d '[],"' | tr ',' '\n' | sed '/^[[:space:]]*$/d' | sort -u | wc -l)
          FINAL_COUNT=$(cat merged_sources.txt | wc -l)
          ADDED=$((FINAL_COUNT - ORIGINAL_COUNT))
          echo "ADDED_COUNT=$ADDED" >> $GITHUB_ENV
          
          echo "[" > Sources.json.new
          while IFS= read -r line; do
            echo "  \"$line\"," >> Sources.json.new
          done < merged_sources.txt
          sed -i '$ s/,$//' Sources.json.new
          echo "]" >> Sources.json.new
          mv Sources.json.new Sources.json
          echo "✅ Added $ADDED new links to Sources.json"

      - name: Generate detailed report
        run: |
          RAW=$(cat subscription_links_raw.txt 2>/dev/null | wc -l | tr -d ' ')
          FOUND=$(cat subscription_links_found.txt 2>/dev/null | wc -l | tr -d ' ')
          VALID=$(cat valid_subscription_links.txt 2>/dev/null | wc -l | tr -d ' ')
          ADDED=${ADDED_COUNT:-0}
          RAW=${RAW:-0}; FOUND=${FOUND:-0}; VALID=${VALID:-0}
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          {
            echo "# 📡 گزارش به‌روزرسانی ساب‌لینک‌ها"
            echo ""
            echo "**تاریخ اجرا:** $DATE"
            echo ""
            echo "## 📊 خلاصه آماری"
            echo ""
            echo "| مرحله | تعداد |"
            echo "|-------|-------|"
            echo "| لینک‌های خام اولیه (subscription_links_raw.txt) | $RAW |"
            echo "| لینک‌های یافت شده توسط جستجو (subscription_links_found.txt) | $FOUND |"
            echo "| لینک‌های معتبر دارای کانفیگ (valid_subscription_links.txt) | $VALID |"
            echo "| **لینک‌های جدید اضافه شده به Sources.json** | **$ADDED** |"
            echo ""
            echo "## 🔗 نمونه لینک‌های معتبر (حداکثر ۱۰ مورد)"
            echo ""
            echo '```'
            head -10 valid_subscription_links.txt 2>/dev/null
            echo '```'
            echo ""
            echo "---"
            echo "✅ این گزارش به صورت خودکار تولید شده است."
          } > reports/subscription_update_report.md
          
          cat reports/subscription_update_report.md >> $GITHUB_STEP_SUMMARY

      - name: Commit and push changes
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Sources.json reports/subscription_update_report.md
          git diff --staged --quiet || git commit -m "📡 Update Sources.json with new valid subscription links ($(date '+%Y-%m-%d %H:%M:%S'))"
          git push

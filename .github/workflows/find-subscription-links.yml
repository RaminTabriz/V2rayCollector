name: Update Sources.json from Valid Links

on:
  workflow_run:
    workflows: ["Find & Validate Subscription Links on GitHub"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare environment
        run: |
          mkdir -p reports
          if [ ! -f Sources.json ]; then
            echo "[]" > Sources.json
          fi
          sudo apt-get update && sudo apt-get install -y jq

      - name: Check if valid links file exists
        id: check_valid
        run: |
          if [ -s valid_subscription_links.txt ]; then
            echo "has_valid=true" >> $GITHUB_OUTPUT
          else
            echo "has_valid=false" >> $GITHUB_OUTPUT
          fi

      # ======================== مرحله 1: ادغام لینک‌های معتبر جدید ========================
      - name: Merge valid links into Sources.json
        id: merge
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          jq -r '.[]' Sources.json | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sort -u > current_sources.txt
          sed 's/^[[:space:]]*//;s/[[:space:]]*$//' valid_subscription_links.txt | sort -u > valid_sorted.txt
          cat current_sources.txt valid_sorted.txt | sort -u > merged_sources.txt
          
          ORIG_COUNT=$(cat current_sources.txt | wc -l)
          FINAL_COUNT=$(cat merged_sources.txt | wc -l)
          ADDED=$((FINAL_COUNT - ORIG_COUNT))
          echo "ADDED_COUNT=$ADDED" >> $GITHUB_ENV
          
          if [ $ADDED -eq 0 ]; then
            echo "⚠️ No new links from valid_subscription_links.txt"
          else
            echo "✅ Adding $ADDED new links from validation step"
          fi
          
          # بازسازی Sources.json موقت
          echo "[" > Sources.json.tmp
          while IFS= read -r line; do
            escaped=$(printf "%s" "$line" | sed 's/["\\]/\\&/g')
            echo "  \"$escaped\"," >> Sources.json.tmp
          done < merged_sources.txt
          sed -i '$ s/,$//' Sources.json.tmp
          echo "]" >> Sources.json.tmp
          
          if jq empty Sources.json.tmp 2>/dev/null; then
            mv Sources.json.tmp Sources.json
          else
            echo "❌ Invalid JSON after merge"
            exit 1
          fi

      # ======================== مرحله 2: اسکن مخازن گیت‌هاب از روی لینک‌های موجود ========================
      - name: Scan GitHub repositories from Sources.json for more subscription files
        id: scan_repos
        run: |
          echo "🔍 Starting repository scan from existing Sources.json links"
          
          # نصب jq قبلاً انجام شده
          # فایل کمکی برای لینک‌های جدید یافت شده از اسکن
          NEW_LINKS_FROM_SCAN="new_from_scan.txt"
          touch "$NEW_LINKS_FROM_SCAN"
          
          # خواندن تمام لینک‌های فعلی Sources.json (یکتا)
          jq -r '.[]' Sources.json > all_current_links.txt
          
          # حلقه روی هر لینک
          while IFS= read -r url; do
            # حذف فاصله‌ها
            url=$(echo "$url" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$url" ] && continue
            
            # بررسی آیا این لینک یک GitHub raw URL است
            REPO_INFO=$(echo "$url" | sed -n 's|https://raw\.githubusercontent\.com/\([^/]*\)/\([^/]*\)/.*|\1 \2|p')
            if [ -z "$REPO_INFO" ]; then
              continue  # لینک غیر گیت‌هبی را نادیده بگیر
            fi
            
            OWNER=$(echo "$REPO_INFO" | cut -d' ' -f1)
            REPO=$(echo "$REPO_INFO" | cut -d' ' -f2)
            echo "📁 Scanning repo: $OWNER/$REPO (from $url)"
            
            # لیست مسیرهایی که ممکن است شامل فایل‌های اشتراک باشند
            for dir_path in "" "main" "subscriptions" "v2ray-configs" "configs" "sub" "Sub" "subs" "sing-box" "clash"; do
              API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$dir_path"
              response=$(curl -s -H "Accept: application/vnd.github.v3+json" "$API_URL")
              
              # بررسی خطا یا عدم وجود دایرکتوری
              if echo "$response" | jq -e '.message == "Not Found"' > /dev/null 2>&1; then
                continue
              fi
              
              # استخراج فایل‌های .txt
              files=$(echo "$response" | jq -r '.[] | select(.type == "file") | select(.name | endswith(".txt")) | .download_url' 2>/dev/null)
              if [ -z "$files" ]; then
                continue
              fi
              
              # فیلتر کردن لینک‌هایی که قبلاً در Sources.json وجود ندارند
              echo "$files" | while read -r file_url; do
                if ! grep -Fxq "$file_url" all_current_links.txt; then
                  echo "$file_url" >> "$NEW_LINKS_FROM_SCAN"
                  echo "  ✅ Found new: $file_url"
                fi
              done
            done
            
            # تاخیر ساده برای جلوگیری از rate limit
            sleep 1
          done < all_current_links.txt
          
          # یکتا کردن لینک‌های جدید
          sort -u -o "$NEW_LINKS_FROM_SCAN" "$NEW_LINKS_FROM_SCAN" 2>/dev/null || true
          NEW_COUNT=$(wc -l < "$NEW_LINKS_FROM_SCAN" 2>/dev/null || echo "0")
          echo "NEW_LINKS_FROM_SCAN_COUNT=$NEW_COUNT" >> $GITHUB_ENV
          
          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "📭 No new links discovered from repository scanning."
          else
            echo "🎉 Found $NEW_COUNT new links from scanning repositories."
            # اضافه کردن لینک‌های جدید به فایل موقت برای ادغام نهایی
            cat "$NEW_LINKS_FROM_SCAN" >> all_current_links.txt
            sort -u all_current_links.txt -o all_current_links.txt
          fi

      # ======================== مرحله 3: بازسازی نهایی Sources.json با لینک‌های اسکن شده ========================
      - name: Final rebuild Sources.json with discovered links
        run: |
          if [ -s all_current_links.txt ]; then
            echo "[" > Sources.json.new
            while IFS= read -r line; do
              escaped=$(printf "%s" "$line" | sed 's/["\\]/\\&/g')
              echo "  \"$escaped\"," >> Sources.json.new
            done < all_current_links.txt
            sed -i '$ s/,$//' Sources.json.new
            echo "]" >> Sources.json.new
            
            # اعتبارسنجی و جایگزینی
            if jq empty Sources.json.new 2>/dev/null; then
              mv Sources.json.new Sources.json
              echo "✅ Sources.json updated with newly scanned subscription links."
            else
              echo "❌ Invalid JSON after scan"
              exit 1
            fi
          else
            echo "No links to update."
          fi

      # ======================== مرحله 4: تولید گزارش ========================
      - name: Generate detailed report
        run: |
          RAW=$(cat subscription_links_raw.txt 2>/dev/null | wc -l | tr -d ' ')
          VALID=$(cat valid_subscription_links.txt 2>/dev/null | wc -l | tr -d ' ')
          ADDED=${ADDED_COUNT:-0}
          SCAN_ADDED=${NEW_LINKS_FROM_SCAN_COUNT:-0}
          TOTAL_ADDED=$((ADDED + SCAN_ADDED))
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          mkdir -p reports
          {
            echo "# 📡 گزارش به‌روزرسانی ساب‌لینک‌ها"
            echo ""
            echo "**تاریخ اجرا:** $DATE"
            echo ""
            echo "## 📊 خلاصه آماری"
            echo ""
            echo "| مرحله | تعداد |"
            echo "|-------|-------|"
            echo "| لینک‌های خام اولیه (از جستجو) | ${RAW:-0} |"
            echo "| لینک‌های معتبر (از اعتبارسنجی) | ${VALID:-0} |"
            echo "| لینک‌های جدید اضافه شده از ادغام مستقیم | $ADDED |"
            echo "| **لینک‌های جدید کشف شده از اسکن مخازن** | **$SCAN_ADDED** |"
            echo "| **جمع لینک‌های جدید اضافه شده** | **$TOTAL_ADDED** |"
            echo ""
            echo "## 🔗 نمونه لینک‌های کشف شده از اسکن مخازن (حداکثر ۱۰ مورد)"
            echo ""
            echo '```'
            head -10 new_from_scan.txt 2>/dev/null
            echo '```'
            echo ""
            echo "---"
            echo "✅ اسکن مخازن به صورت خودکار از روی لینک‌های موجود در Sources.json انجام شد."
          } > reports/subscription_update_report.md
          
          cat reports/subscription_update_report.md >> $GITHUB_STEP_SUMMARY

      # ======================== مرحله 5: Commit و Push ========================
      - name: Commit and push changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Sources.json reports/subscription_update_report.md
          git add new_from_scan.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "📭 No changes to commit."
          else
            git commit -m "📡 Update Sources.json with new valid links + repo scan ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
            echo "✅ Changes committed and pushed."
          fi

name: Find & Validate Subscription Links on GitHub

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Search GitHub for subscription files
        uses: actions/github-script@v7
        id: search
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const queries = [
              'subscription extension:txt',
              'v2ray extension:txt',
              'vmess extension:txt',
              'vless extension:txt',
              'trojan extension:txt',
              'shadowsocks extension:txt',
              'base64 extension:txt',
              'subscription extension:json',
              'config extension:yaml',
              'sub extension:txt',
              'iran extension:txt',
              'mixed extension:txt',
              'clash extension:yaml',
              'sing-box extension:json'
            ];
            
            let allUrls = new Set();
            let page = 1;
            const maxPages = 8;
            
            for (const q of queries) {
              page = 1;
              let hasNext = true;
              while (hasNext && page <= maxPages) {
                try {
                  await new Promise(r => setTimeout(r, 500));
                  const result = await github.rest.search.code({
                    q: `${q} sort:updated-desc`,
                    per_page: 100,
                    page: page
                  });
                  
                  for (const item of result.data.items) {
                    let branch = item.repository.default_branch;
                    if (!branch) branch = 'main';
                    const rawUrl = `https://raw.githubusercontent.com/${item.repository.full_name}/${branch}/${item.path}`;
                    allUrls.add(rawUrl);
                  }
                  
                  hasNext = result.data.items.length === 100;
                  page++;
                } catch (err) {
                  console.log(`Error with query ${q} page ${page}: ${err.message}`);
                  break;
                }
              }
            }
            
            const urlList = Array.from(allUrls).map(u => u.trim()).filter(u => u.length > 0);
            fs.writeFileSync('subscription_links_raw.txt', urlList.join('\n'));
            console.log(`Found ${urlList.length} unique raw URLs`);
            return urlList.length;

      - name: Validate each link (deep content check)
        run: |
          rm -f valid_subscription_links.txt
          touch valid_subscription_links.txt
          
          PROTOCOLS='(vmess://|vless://|trojan://|ss://|ssr://|hysteria2://|hy2://|tuic://|wireguard://|tg://proxy|tg://socks|socks5?://|-----BEGIN ARGO VPN BRIDGE BLOCK-----)'
          
          validate_link() {
            local url="$1"
            url=$(echo "$url" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$url" ] && return 0
            
            local tmp_file=$(mktemp)
            local http_code=$(curl -s -o "$tmp_file" -w "%{http_code}" --max-time 15 --connect-timeout 10 "$url" 2>/dev/null)
            
            if [[ "$http_code" != "200" ]]; then
              echo "❌ $http_code $url"
              rm -f "$tmp_file"
              return 0
            fi
            
            local file_size=$(wc -c < "$tmp_file" 2>/dev/null || echo "0")
            if [ "$file_size" -lt 500 ]; then
              echo "⚠️ tiny file ($file_size bytes) $url"
              rm -f "$tmp_file"
              return 0
            fi
            
            if head --bytes=2M "$tmp_file" 2>/dev/null | grep -qE "$PROTOCOLS"; then
              echo "✅ $url"
              echo "$url" >> valid_subscription_links.txt
            else
              echo "⚠️ no config in $url"
            fi
            
            rm -f "$tmp_file"
            return 0
          }
          
          export -f validate_link
          export PROTOCOLS
          
          # اصلاح: استفاده از -d '\n' برای جلوگیری از مشکل نقل قول
          cat subscription_links_raw.txt | xargs -d '\n' -I {} -P 3 bash -c 'validate_link "$@" || true' _ {}
          
          sort -u valid_subscription_links.txt -o valid_subscription_links.txt
          sed -i '/^[[:space:]]*$/d' valid_subscription_links.txt
          
          VALID_COUNT=$(wc -l < valid_subscription_links.txt)
          echo "✅ Valid links found: $VALID_COUNT"
          
          if [ "$VALID_COUNT" -eq 0 ]; then
            echo "⚠️ No valid links found. Adding known working sources as fallback."
            cat > valid_subscription_links.txt << 'EOF'
          https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/All_Configs_Sub.txt
          https://raw.githubusercontent.com/wang1680/v2ray-configs/main/all_configs.txt
          https://raw.githubusercontent.com/iranxray/hope/main/all_configs.txt
          https://raw.githubusercontent.com/freefq/free/main/v2ray
          https://raw.githubusercontent.com/ssrsub/ssr/master/ssr-sub
          EOF
            sort -u -o valid_subscription_links.txt valid_subscription_links.txt
          fi

      - name: Generate validation report
        run: |
          RAW_COUNT=$(cat subscription_links_raw.txt 2>/dev/null | wc -l | tr -d ' ')
          VALID_COUNT=$(cat valid_subscription_links.txt 2>/dev/null | wc -l | tr -d ' ')
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          mkdir -p reports
          {
            echo "# 🔍 گزارش اعتبارسنجی لینک‌های اشتراک"
            echo "**تاریخ اجرا:** $DATE"
            echo "| مرحله | تعداد |"
            echo "|---|---|"
            echo "| لینک‌های خام یافت شده | $RAW_COUNT |"
            echo "| لینک‌های معتبر (دارای کانفیگ) | $VALID_COUNT |"
            echo "## نمونه لینک‌های معتبر"
            echo '```'
            head -10 valid_subscription_links.txt
            echo '```'
          } > reports/validation_report.md
          
          cat reports/validation_report.md >> $GITHUB_STEP_SUMMARY

      - name: Commit and push results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add subscription_links_raw.txt valid_subscription_links.txt reports/validation_report.md
          git diff --staged --quiet || git commit -m "🔍 Update subscription links (validated) $(date '+%Y-%m-%d %H:%M:%S')"
          git push

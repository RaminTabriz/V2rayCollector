name: Find & Validate Subscription Links on GitHub

on:
  schedule:
    - cron: "0 */12 * * *"   # هر 12 ساعت (کاهش نرخ درخواست)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Search GitHub for subscription files
        uses: actions/github-script@v7
        id: search
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            // الگوهای جستجوی بهبود یافته - دنبال محتوای حاوی لینک‌های کانفیگ
            const queries = [
              'vmess:// extension:txt',
              'vless:// extension:txt',
              'trojan:// extension:txt',
              'ss:// extension:txt',
              'subscription extension:txt',
              'v2ray config extension:txt',
              'iran v2ray extension:txt',
              'free v2ray extension:txt',
              'sub link extension:txt',
              'all_configs extension:txt'
            ];
            let allUrls = new Set();
            for (const q of queries) {
              let page = 1;
              let hasNext = true;
              while (hasNext && page <= 3) { // محدودیت ۳ صفحه برای کاهش زمان
                try {
                  const result = await github.rest.search.code({
                    q: `${q} sort:updated-desc`,
                    per_page: 50,
                    page: page
                  });
                  for (const item of result.data.items) {
                    // تلاش برای دریافت نام برنچ صحیح (با fallback)
                    let branch = item.repository.default_branch;
                    if (!branch) branch = 'main';
                    const rawUrl = `https://raw.githubusercontent.com/${item.repository.full_name}/${branch}/${item.path}`;
                    allUrls.add(rawUrl);
                  }
                  hasNext = result.data.items.length === 50;
                  page++;
                  await new Promise(r => setTimeout(r, 1000)); // تأخیر بیشتر برای احترام به rate limit
                } catch (err) {
                  console.log(`Error query ${q} page ${page}: ${err.message}`);
                  break;
                }
              }
            }
            const urlList = Array.from(allUrls);
            console.log(`Found ${urlList.length} unique raw URLs`);
            fs.writeFileSync('subscription_links_raw.txt', urlList.join('\n'));
            return urlList.length;

      - name: Validate each link (status + config presence)
        run: |
          rm -f valid_subscription_links.txt
          touch valid_subscription_links.txt
          check_link() {
            local url="$1"
            local status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null)
            if [[ "$status" != "200" ]]; then
              echo "❌ $url -> status $status"
              return 0
            fi
            # دانلود 5KB اول محتوا (برای دیدن کانفیگ‌های طولانی‌تر)
            local content=$(curl -s --max-time 10 --range 0-5120 "$url" 2>/dev/null)
            if [[ -z "$content" ]]; then
              echo "⚠️  $url -> empty content"
              return 0
            fi
            if echo "$content" | grep -qE '(vmess://|vless://|trojan://|ss://|ssr://|hysteria2://|hy2://|tuic://|wireguard://|tg://proxy|tg://socks|slipnet://|socks5?://|-----BEGIN ARGO)'; then
              echo "✅ $url -> valid"
              echo "$url" >> valid_subscription_links.txt
            else
              echo "⚠️  $url -> no config pattern found"
            fi
            return 0
          }
          export -f check_link
          cat subscription_links_raw.txt | xargs -I {} -P 3 bash -c 'check_link "$@" || true' _ {}
          echo "Valid links count: $(wc -l < valid_subscription_links.txt)"

      - name: If no valid links found, seed with known working sources
        run: |
          if [ ! -s valid_subscription_links.txt ]; then
            echo "No valid links found. Adding known working subscription sources as fallback."
            cat > valid_subscription_links.txt << 'EOF'
            https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/All_Configs_Sub.txt
            https://raw.githubusercontent.com/wang1680/v2ray-configs/main/all_configs.txt
            https://raw.githubusercontent.com/iranxray/hope/main/all_configs.txt
            EOF
          fi

      - name: Add to job summary
        run: |
          echo "## 🔍 Subscription links validation result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| مرحله | تعداد |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| کل لینک‌های یافت شده | `$(cat subscription_links_raw.txt | wc -l)` |" >> $GITHUB_STEP_SUMMARY
          echo "| لینک‌های معتبر (دارای کانفیگ) | `$(cat valid_subscription_links.txt | wc -l)` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**نمونه لینک‌های معتبر:**" >> $GITHUB_STEP_SUMMARY
          head -10 valid_subscription_links.txt >> $GITHUB_STEP_SUMMARY

      - name: Commit and push results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add subscription_links_raw.txt valid_subscription_links.txt
          git diff --staged --quiet || git commit -m "🔍 Update subscription links (validated) $(date '+%Y-%m-%d %H:%M:%S')"
          git push

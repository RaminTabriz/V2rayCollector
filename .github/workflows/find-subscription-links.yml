name: Update Sources.json from Valid Links

on:
  workflow_run:
    workflows: ["Find & Validate Subscription Links on GitHub"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare environment
        run: |
          mkdir -p reports
          if [ ! -f Sources.json ]; then
            echo "[]" > Sources.json
          fi

      - name: Check if valid links file exists
        id: check_valid
        run: |
          if [ -s valid_subscription_links.txt ]; then
            echo "has_valid=true" >> $GITHUB_OUTPUT
          else
            echo "has_valid=false" >> $GITHUB_OUTPUT
            echo "⚠️ No valid_subscription_links.txt found or empty. Skipping update."
          fi

      # مرحله دیباگ: نمایش محتوای فایل‌ها قبل از ادغام
      - name: Debug - Show content of files
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          echo "=== valid_subscription_links.txt ==="
          cat valid_subscription_links.txt
          echo ""
          echo "=== Current Sources.json ==="
          cat Sources.json
          echo ""
          echo "=== Extracted current sources (using tr + sed) ==="
          cat Sources.json | tr -d '[],"' | tr ',' '\n' | sed '/^[[:space:]]*$/d' > current_sources.txt
          cat current_sources.txt
          echo ""
          echo "=== Merged sources (after adding valid links and sort -u) ==="
          cat valid_subscription_links.txt >> current_sources.txt
          sort -u current_sources.txt > merged_sources.txt
          cat merged_sources.txt
          echo ""
          echo "=== Counts ==="
          ORIG_COUNT=$(cat Sources.json | tr -d '[],"' | tr ',' '\n' | sed '/^[[:space:]]*$/d' | sort -u | wc -l)
          VALID_COUNT=$(cat valid_subscription_links.txt | wc -l)
          MERGED_COUNT=$(cat merged_sources.txt | wc -l)
          echo "Original unique sources count: $ORIG_COUNT"
          echo "Valid links count: $VALID_COUNT"
          echo "Merged unique count: $MERGED_COUNT"
          echo "Expected new links: $((MERGED_COUNT - ORIG_COUNT))"

      - name: Merge valid links into Sources.json (robust)
        id: merge
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          # استخراج لینک‌های فعلی از Sources.json (حذف کروشه، کاما، نقل قول و خطوط خالی)
          cat Sources.json | tr -d '[],"' | tr ',' '\n' | sed '/^[[:space:]]*$/d' | sort -u > current_sources.txt
          # گرفتن لینک‌های معتبر (مرتب و یکتا)
          cat valid_subscription_links.txt | sort -u > valid_sorted.txt
          # ادغام و حذف تکراری‌ها
          cat current_sources.txt valid_sorted.txt | sort -u > merged_sources.txt
          
          ORIGINAL_COUNT=$(cat current_sources.txt | wc -l)
          FINAL_COUNT=$(cat merged_sources.txt | wc -l)
          ADDED=$((FINAL_COUNT - ORIGINAL_COUNT))
          echo "ADDED_COUNT=$ADDED" >> $GITHUB_ENV
          
          if [ $ADDED -eq 0 ]; then
            echo "⚠️ No new links to add. Sources.json unchanged."
            # همچنان ادامه می‌دهیم تا گزارش تولید شود ولی commit نمی‌کنیم (در مرحله بعد شرط می‌شود)
          else
            echo "✅ Adding $ADDED new links to Sources.json"
          fi
          
          # ساخت Sources.json جدید
          echo "[" > Sources.json.new
          while IFS= read -r line; do
            # فرار از کاراکترهای خاص (مثل " و \ ) درون URL
            escaped_line=$(printf "%s" "$line" | sed 's/["\\]/\\&/g')
            echo "  \"$escaped_line\"," >> Sources.json.new
          done < merged_sources.txt
          # حذف کامای آخرین خط
          sed -i '$ s/,$//' Sources.json.new
          echo "]" >> Sources.json.new
          mv Sources.json.new Sources.json
          
          echo "ORIGINAL_COUNT=$ORIGINAL_COUNT" >> $GITHUB_ENV
          echo "FINAL_COUNT=$FINAL_COUNT" >> $GITHUB_ENV

      - name: Generate detailed report
        run: |
          RAW=$(cat subscription_links_raw.txt 2>/dev/null | wc -l | tr -d ' ')
          FOUND=$(cat subscription_links_found.txt 2>/dev/null | wc -l | tr -d ' ')
          VALID=$(cat valid_subscription_links.txt 2>/dev/null | wc -l | tr -d ' ')
          ADDED=${ADDED_COUNT:-0}
          RAW=${RAW:-0}; FOUND=${FOUND:-0}; VALID=${VALID:-0}
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          {
            echo "# 📡 گزارش به‌روزرسانی ساب‌لینک‌ها"
            echo ""
            echo "**تاریخ اجرا:** $DATE"
            echo ""
            echo "## 📊 خلاصه آماری"
            echo ""
            echo "| مرحله | تعداد |"
            echo "|-------|-------|"
            echo "| لینک‌های خام اولیه (subscription_links_raw.txt) | $RAW |"
            echo "| لینک‌های یافت شده توسط جستجو (subscription_links_found.txt) | $FOUND |"
            echo "| لینک‌های معتبر دارای کانفیگ (valid_subscription_links.txt) | $VALID |"
            echo "| **لینک‌های جدید اضافه شده به Sources.json** | **$ADDED** |"
            echo ""
            echo "## 🔗 نمونه لینک‌های معتبر (حداکثر ۱۰ مورد)"
            echo ""
            echo '```'
            head -10 valid_subscription_links.txt 2>/dev/null
            echo '```'
            echo ""
            echo "---"
            echo "✅ این گزارش به صورت خودکار تولید شده است."
          } > reports/subscription_update_report.md
          
          cat reports/subscription_update_report.md >> $GITHUB_STEP_SUMMARY

      - name: Commit and push changes
        if: steps.check_valid.outputs.has_valid == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Sources.json reports/subscription_update_report.md
          # فقط در صورت وجود تغییر commit کن
          if git diff --staged --quiet; then
            echo "📭 No changes to commit."
          else
            git commit -m "📡 Update Sources.json with new valid subscription links ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
            echo "✅ Changes committed and pushed."
          fi

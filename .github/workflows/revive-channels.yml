name: Revive Channels from Archive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  revive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.3'

      - name: Create directories
        run: mkdir -p reports data

      - name: Download dependencies
        run: go mod download

      - name: Run revive scanner (new modular version)
        run: |
          go run ./cmd/revive-scanner 2>&1
        continue-on-error: false

      - name: Commit changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add channels.csv data/ reports/
          git diff --staged --quiet || git commit -m "🔄 Daily revive check"
          git pull --rebase --autostash origin main
          git push origin main

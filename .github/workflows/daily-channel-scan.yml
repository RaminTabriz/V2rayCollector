name: Daily Channel Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.3'

      - name: Create directories
        run: mkdir -p reports data

      - name: Ensure channels.csv exists
        run: |
          if [ ! -s channels.csv ]; then
            echo "URL,AllMessagesFlag" > channels.csv
            echo "https://t.me/s/FreeV2rays,false" >> channels.csv
          fi

      - name: Download dependencies
        run: go mod download

      - name: Run channel scanner (new modular version)
        run: |
          go run ./cmd/channel-scanner -input channels.csv -output channels.csv 2>&1
        continue-on-error: false

      - name: Commit changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add channels.csv data/ reports/
          git diff --staged --quiet || git commit -m "📊 Daily channel scan report"
          git pull --rebase --autostash origin main
          git push origin main
